services:
  - type: web
    name: twilio-conversations-demo
    runtime: python
    buildCommand: pip install flask anthropic twilio python-dotenv
    startCommand: python demo_server.py
    envVars:
      - key: MOCK_MODE
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
